<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/output.css">
    <title>Document</title>
</head>
<body>
    <div class="flex justify-center items-center min-h-screen bg-blue-50">
        <!--Menu container-->
        <div class="w-50 rounded-2xl relative">
            <a href="#" class="flex items-center justify-between px-5 py-3
             bg-white dark:bg-gray-600  font-semibold group">
                <span class="text-gray-500 group-hover:text-black dark:text-white">Product</span>
                <div id="icon">
                    <svg class="w-6 h-6 text-gray-500 group-hover:text-black  dark:text-white dark:group-hover:text-gray-200" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m8 15 4 4 4-4m0-6-4-4-4 4"/>
                    </svg>
                </div>  
            </a>
            <!--Drop Down Menu-->
            <div id="menuItems" class="hidden">
                <ul  class="absolute  top-12.5 z-20 
            w-full shadow-lg bg-white rounded-b-xl text-gray-500 dark:gray-700 flex flex-col justify-center
             ">
                <li>
                    <a href="" class="block hover:rounded-2xl border-b p-3 hover:bg-gray-900 hover:text-white hover:scale-90 duration-300">Machine</a>
                </li>
                <li>
                    <a href="" class="block hover:rounded-2xl border-b p-3 hover:bg-gray-900 hover:text-white hover:scale-90 duration-300">Laptop</a>
                </li>
                <li>
                    <a href="" class="block hover:rounded-2xl border-b p-3 hover:bg-gray-900 hover:text-white hover:scale-90 duration-300">Phone</a>
                </li>
            </ul>
            </div>
            
        </div>
    </div>

    <script>
        const icon = document.getElementById("icon");
        const menu = document.getElementById("menuItems");
        function displayMenu(){
            icon.addEventListener("click", function(e){
                e.preventDefault();
                menu.classList.toggle("hidden");
            });
        }

        displayMenu();
    </script>
</body>
</html>
