<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/output.css">
    <title>Responsive menu</title>
</head>
<body class="bg-orange-50">
    <nav class="bg-white p-5 shadow flex justify-between items-center w-full relative">
        <!---Logo-->
        <div class="text-xl text-orange-800">Horizontal</div>
        <!---Main menu-->
        <ul class="mainMenu flex flex-col space-y-5 md:space-y-0 absolute top-[70px] w-full
            md:flex-row md:space-x-4 md:shadow-none md:static left-0 p-4 shadow
            md:shadow-none rounded-b-xl md:w-auto opacity-0 md:opacity-100">
            <li class="group"><a href="#" class="group-hover:text-orange-500">Contact</a></li>
            <li class="group"><a href="#" class="group-hover:text-orange-500">About</a></li>
            <li class="group"><a href="#" class="group-hover:text-orange-500">Blog</a></li>
            <li class="group"><a href="#" class="group-hover:text-orange-500">Services</a></li>
            <li class="group"><a href="#" class="group-hover:text-orange-500">Products</a></li>
            <li>
                <button class="border border-orange-700 rounded
                 md:py-0 w-full px-1 py-2  text-sm hover:text-orange-700 hover:bg-red-50">Explorer</button>
            </li>
        </ul>
        <!--Menu icon-->
        <div class="md:hidden ">
            <i class="fa-solid fa-bars w-6 h-6 openMenu"></i>
        </div>
        <div class="hidden closebtn cursor-pointer">
            <i class="fa-solid fa-xmark w-6 h-6 closeMenu"></i>
        </div>
    </nav>
    <script >
        const openMenu = document.querySelector(".openMenu")
        const closeMenu = document.querySelector(".closebtn")
        const mainMenu = document.querySelector(".mainMenu")

        openMenu.addEventListener("click", function(){
            
            mainMenu.style.opacity = 100;
            openMenu.style.opacity = 0;
            closeMenu.classList.remove("hidden")
            mainMenu.classList.toggle("duration-700");
        });

        closeMenu.addEventListener("click", function(){
            mainMenu.style.opacity = 0;
            openMenu.style.opacity = 100;
            closeMenu.classList.add("hidden");
            mainMenu.classList.toggle("duration-700");
        });
    </script>
</body>
</html>
